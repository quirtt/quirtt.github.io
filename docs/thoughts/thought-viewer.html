<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thought</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background-color: #0d1117;
            color: #c9d1d9;
            padding: 2rem;
            line-height: 1.7;
        }
        
        .container {
            max-width: 900px;
            margin: 0 auto;
        }
        
        .header {
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid #30363d;
        }
        
        h1 {
            color: #58a6ff;
            margin-bottom: 0.5rem;
        }
        
        .breadcrumb {
            color: #8b949e;
            font-size: 0.9rem;
        }
        
        .breadcrumb a {
            color: #58a6ff;
            text-decoration: none;
        }
        
        .breadcrumb a:hover {
            text-decoration: underline;
        }
        
        /* Markdown rendering */
        #content h1, #content h2, #content h3, #content h4, #content h5, #content h6 {
            color: #58a6ff;
            margin-top: 1.5rem;
            margin-bottom: 1rem;
        }
        
        #content h1 { font-size: 2rem; }
        #content h2 { font-size: 1.5rem; }
        #content h3 { font-size: 1.25rem; }
        
        #content p {
            margin-bottom: 1rem;
        }
        
        #content ul, #content ol {
            margin-left: 2rem;
            margin-bottom: 1rem;
        }
        
        #content li {
            margin-bottom: 0.5rem;
        }
        
        #content code {
            background-color: #161b22;
            color: #79c0ff;
            padding: 0.2rem 0.4rem;
            border-radius: 3px;
            font-family: 'Courier New', monospace;
            font-size: 0.9em;
        }
        
        #content pre {
            background-color: #161b22;
            color: #c9d1d9;
            padding: 1rem;
            border-radius: 6px;
            overflow-x: auto;
            margin-bottom: 1rem;
            border: 1px solid #30363d;
        }
        
        #content pre code {
            background: none;
            color: inherit;
            padding: 0;
            border-radius: 0;
        }
        
        #content blockquote {
            border-left: 4px solid #58a6ff;
            padding-left: 1rem;
            margin-left: 0;
            margin-bottom: 1rem;
            color: #8b949e;
        }
        
        #content a {
            color: #58a6ff;
            text-decoration: none;
        }
        
        #content a:hover {
            text-decoration: underline;
        }
        
        #content img {
            max-width: 100%;
            height: auto;
            margin: 1rem 0;
            border-radius: 6px;
        }
        
        #content table {
            border-collapse: collapse;
            width: 100%;
            margin: 1rem 0;
        }
        
        #content table td, #content table th {
            border: 1px solid #30363d;
            padding: 0.5rem 1rem;
            text-align: left;
        }
        
        #content table th {
            background-color: #161b22;
            color: #58a6ff;
        }
        
        .loading {
            color: #8b949e;
            font-style: italic;
        }
        
        .error {
            color: #f85149;
            padding: 1rem;
            border-left: 4px solid #f85149;
            background-color: #161b22;
            border-radius: 3px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="breadcrumb">
                <a href="/thoughts/">← Thoughts</a> / <span id="filename">Loading...</span>
            </div>
            <h1 id="title">Loading...</h1>
        </div>
        
        <div id="content" class="loading">Loading markdown file...</div>
    </div>
    
    <script>
        // Get filename from URL
        const filename = window.location.pathname.split('/').pop();
        document.getElementById('filename').textContent = filename.replace('.md', '').replace(/-/g, ' ');
        document.getElementById('title').textContent = filename.replace('.md', '').replace(/-/g, ' ');
        
        // Fetch and render markdown
        fetch(filename)
            .then(response => {
                if (!response.ok) throw new Error('File not found');
                return response.text();
            })
            .then(markdown => {
                // Configure marked options
                marked.setOptions({
                    breaks: true,
                    gfm: true,
                });
                
                const html = marked.parse(markdown);
                document.getElementById('content').innerHTML = html;
            })
            .catch(error => {
                document.getElementById('content').innerHTML = 
                    `<div class="error">⚠️ Error: ${error.message}</div>`;
                console.error('Error loading markdown:', error);
            });
    </script>
</body>
</html>
