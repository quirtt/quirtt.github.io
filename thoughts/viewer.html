<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thought</title>
    
    <!-- Markdown parser -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    
    <!-- LaTeX math rendering -->
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        html, body {
            height: 100%;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background-color: #0d1117;
            color: #c9d1d9;
            padding: 2rem;
            line-height: 1.8;
        }
        
        .container {
            max-width: 900px;
            margin: 0 auto;
        }
        
        .header {
            margin-bottom: 2rem;
            padding-bottom: 1.5rem;
            border-bottom: 1px solid #30363d;
        }
        
        .breadcrumb {
            color: #8b949e;
            font-size: 0.95rem;
            margin-bottom: 1rem;
        }
        
        .breadcrumb a {
            color: #58a6ff;
            text-decoration: none;
        }
        
        .breadcrumb a:hover {
            text-decoration: underline;
        }
        
        h1 {
            color: #58a6ff;
            font-size: 2.2rem;
            margin-bottom: 0.5rem;
        }
        
        .metadata {
            color: #8b949e;
            font-size: 0.9rem;
        }
        
        /* Markdown content styles */
        #content {
            margin-top: 2rem;
        }
        
        #content h1, #content h2, #content h3, #content h4, #content h5, #content h6 {
            color: #58a6ff;
            margin-top: 1.8rem;
            margin-bottom: 1rem;
            font-weight: 600;
        }
        
        #content h1 { font-size: 2rem; }
        #content h2 { font-size: 1.75rem; }
        #content h3 { font-size: 1.5rem; }
        #content h4 { font-size: 1.25rem; }
        #content h5 { font-size: 1.1rem; }
        #content h6 { font-size: 1rem; }
        
        #content p {
            margin-bottom: 1.2rem;
            text-align: justify;
        }
        
        #content ul, #content ol {
            margin-left: 2rem;
            margin-bottom: 1.2rem;
        }
        
        #content li {
            margin-bottom: 0.6rem;
        }
        
        #content ul ul, #content ol ol {
            margin-top: 0.6rem;
        }
        
        #content code {
            background-color: #161b22;
            color: #79c0ff;
            padding: 0.2rem 0.5rem;
            border-radius: 4px;
            font-family: 'Courier New', monospace;
            font-size: 0.95em;
        }
        
        #content pre {
            background-color: #161b22;
            color: #c9d1d9;
            padding: 1.2rem;
            border-radius: 6px;
            overflow-x: auto;
            margin: 1.2rem 0;
            border: 1px solid #30363d;
            line-height: 1.5;
        }
        
        #content pre code {
            background: none;
            color: inherit;
            padding: 0;
            border-radius: 0;
            font-size: 0.9em;
        }
        
        #content blockquote {
            border-left: 4px solid #58a6ff;
            padding-left: 1.2rem;
            margin-left: 0;
            margin-bottom: 1.2rem;
            color: #8b949e;
            font-style: italic;
        }
        
        #content a {
            color: #58a6ff;
            text-decoration: none;
            border-bottom: 1px dotted #58a6ff;
        }
        
        #content a:hover {
            color: #79c0ff;
            border-bottom: 1px solid #79c0ff;
        }
        
        #content img {
            max-width: 100%;
            height: auto;
            margin: 1.5rem 0;
            border-radius: 6px;
            border: 1px solid #30363d;
        }
        
        #content table {
            border-collapse: collapse;
            width: 100%;
            margin: 1.2rem 0;
        }
        
        #content table td, #content table th {
            border: 1px solid #30363d;
            padding: 0.8rem;
            text-align: left;
        }
        
        #content table th {
            background-color: #161b22;
            color: #58a6ff;
            font-weight: 600;
        }
        
        #content table tr:nth-child(even) {
            background-color: rgba(88, 166, 255, 0.05);
        }
        
        /* LaTeX/Math styles */
        .katex {
            font-size: 1.05em;
        }
        
        #content .katex-display {
            margin: 1.2rem 0;
        }
        
        /* Loading and error states */
        .loading {
            text-align: center;
            padding: 3rem;
            color: #8b949e;
        }
        
        .loading::after {
            content: '';
            animation: dots 1.5s steps(4, end) infinite;
        }
        
        @keyframes dots {
            0%, 20% { content: ''; }
            40% { content: '.'; }
            60% { content: '..'; }
            80%, 100% { content: '...'; }
        }
        
        .error {
            background-color: #161b22;
            border: 1px solid #f85149;
            border-left: 4px solid #f85149;
            color: #f85149;
            padding: 1.5rem;
            border-radius: 6px;
            margin: 2rem 0;
        }
        
        .error strong {
            display: block;
            margin-bottom: 0.5rem;
            font-size: 1.1rem;
        }
        
        .footer {
            margin-top: 3rem;
            padding-top: 1rem;
            border-top: 1px solid #30363d;
            color: #8b949e;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="breadcrumb">
                <a href="./">← Back to thoughts</a> / <span id="filename">Loading...</span>
            </div>
            <h1 id="title">Loading...</h1>
            <div class="metadata" id="metadata"></div>
        </div>
        
        <div id="content" class="loading">Loading markdown file...</div>
        
        <div class="footer">
            <a href="./">← Back to all thoughts</a>
        </div>
    </div>
    
    <script>
        // Get filename from URL parameter
        const params = new URLSearchParams(window.location.search);
        let filename = params.get('file');
        
        // Fallback: try to get from pathname
        if (!filename) {
            filename = window.location.pathname.split('/').pop();
        }
        
        console.log('Viewer loading file:', filename);
        
        if (!filename || filename === 'viewer.html' || filename === '') {
            showError('No file specified. Use ?file=filename.md');
        } else {
            loadAndRenderMarkdown(filename);
        }
        
        function loadAndRenderMarkdown(filename) {
            // Update page title and header
            const displayName = filename.replace('.md', '').replace(/-/g, ' ');
            document.getElementById('filename').textContent = displayName;
            document.getElementById('title').textContent = displayName;
            document.title = displayName + ' - Thoughts';
            
            // Fetch the markdown file
            fetch('./' + filename)
                .then(response => {
                    if (!response.ok) {
                        throw new Error(`HTTP ${response.status}: File not found. Make sure ${filename} exists.`);
                    }
                    return response.text();
                })
                .then(markdown => {
                    renderMarkdown(markdown);
                })
                .catch(error => {
                    console.error('Error loading file:', error);
                    showError(`Failed to load ${filename}<br><br>${error.message}`);
                });
        }
        
        function renderMarkdown(markdown) {
            // Configure marked options
            marked.setOptions({
                breaks: true,
                gfm: true,
                pedantic: false,
                smartypants: true,
            });
            
            // Parse and render markdown
            const html = marked.parse(markdown);
            const contentDiv = document.getElementById('content');
            contentDiv.innerHTML = html;
            
            // Render LaTeX math with KaTeX
            try {
                renderMathInElement(contentDiv, {
                    delimiters: [
                        { left: '$$', right: '$$', display: true },
                        { left: '$', right: '$', display: false },
                        { left: '\\(', right: '\\)', display: false },
                        { left: '\\[', right: '\\]', display: true }
                    ],
                    throwOnError: false
                });
            } catch (error) {
                console.warn('Math rendering error:', error);
            }
            
            // Update metadata
            const lines = markdown.split('\n');
            const wordCount = markdown.split(/\s+/).length;
            document.getElementById('metadata').textContent = `${wordCount} words`;
        }
        
        function showError(message) {
            document.getElementById('content').innerHTML = 
                `<div class="error"><strong>Error</strong>${message}</div>`;
        }
    </script>
</body>
</html>
